<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Forgalom</title>
	<link rel="stylesheet" href="src/res/style.css">
</head>
<body>

	<main>

		<section>
			<h2>Tétel hozzáadása</h2>

			<form action="">
				<div>
					<label for="name">Megnevezés</label>
					<input type="text" id="name" name="name">
				</div>
				<div>
					<label for="amount">Összeg</label>
					<input type="number" id="amount" name="amount" value="1">
				</div>
				<div>
					<label for="type">Típus</label>
					<select name="type" id="type">
						<option value="0">Kiadás</option>
						<option value="1">Bevétel</option>
					</select>
				</div>
				<button>Hozzáad</button>
			</form>
		</section>
		
		<section>
			<h2>Összesítés</h2>

			<div class="info">
				<p>Bevételek összesen: <strong>- HUF</strong></p>
				<p>Kiadások összesen: <strong>- HUF</strong></p>
				<p>Egyenleg: <strong>- HUF</strong></p>
			</div>
		</section>
		
		<section>
			<h2>Pénzforgalom</h2>

			<table>
				<thead>
					<tr>
						<th>Megnevezés</th>
						<th>Típus</th>
						<th>Összeg</th>
					</tr>
					</thead>
				<tbody>
						<tr>
							<td>Első</td>
							<td>Kiadás</td>
							<td>1000 HUF</td>
						</tr>
					</tbody>
				</table>
			</section>
			
		</main>

	<script type="module" src="src/main.js"></script>
	
</body>
</html>
